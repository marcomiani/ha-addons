configuration:
  dahua_ip:
    name: Dahua IP address
    description: IP address of the Dahua doorbell / SIP server on your LAN.
  dahua_port:
    name: Dahua SIP port
    description: UDP port the Dahua SIP server listens on (usually 5060).
  wss_port:
    name: WSS listen port
    description: >-
      TCP port where Kamailio accepts Secure WebSocket (WSS) connections
      from the sipclient-hass integration. Must be reachable from your tablet.
  certfile:
    name: SSL certificate file
    description: >-
      Filename of the SSL certificate inside the /ssl directory
      (e.g. fullchain.pem — generated by the DuckDNS add-on).
  keyfile:
    name: SSL private key file
    description: >-
      Filename of the private key inside the /ssl directory
      (e.g. privkey.pem — generated by the DuckDNS add-on).
