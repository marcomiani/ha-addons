name: "Kamailio SIP Gateway"
description: >-
  Kamailio SIP gateway: bridges SIP over Secure WebSocket (WSS) to plain SIP/UDP.
  Allows the sipclient-hass integration to work with Dahua doorbells and similar
  SIP servers that only speak UDP/TCP.
version: "0.1.2"
slug: "mm-kamailio"
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

# Share host network so Kamailio can receive UDP SIP from the doorbell
host_network: true

options:
  dahua_ip: "192.168.1.92"
  dahua_port: 5060
  wss_port: 8443
  certfile: "fullchain.pem"
  keyfile: "privkey.pem"

schema:
  dahua_ip: str
  dahua_port: int
  wss_port: int
  certfile: str
  keyfile: str

# Mount HA's /ssl directory (read-only) for TLS certificates
map:
  - ssl:ro
